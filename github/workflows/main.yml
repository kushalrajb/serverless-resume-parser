name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanners
        run: pip install bandit checkov

      - name: Bandit — Python security scan
        run: bandit -r lambda/ -f txt

      - name: Checkov — Terraform IaC scan
        run: checkov -d terraform/ --config-file terraform/.checkov.yaml --quiet

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3 PyPDF2

      - name: Run tests
        run: python tests/test_parser.py

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/github-actions-resume-parser
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Package Lambda
        run: |
          pip install PyPDF2 -t lambda/package/
          cp lambda/parser.py lambda/package/
          cd lambda/package && zip -r ../parser.zip .
          cd ../.. && rm -rf lambda/package

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Get existing resource IDs
        id: get_ids
        run: |
          BUCKET=$(aws s3api list-buckets --query 'Buckets[?starts_with(Name, `resume-parser-uploads-dev`)].Name' --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          API_ID=$(aws apigatewayv2 get-apis --query 'Items[?Name==`resume-parser-api-dev`].ApiId' --output text)
          echo "api_id=$API_ID" >> $GITHUB_OUTPUT

      - name: Import existing resources
        working-directory: terraform
        continue-on-error: true
        run: |
          terraform import aws_iam_role.lambda_role resume-parser-lambda-role-dev || true
          terraform import aws_iam_role_policy.lambda_policy resume-parser-lambda-role-dev:resume-parser-lambda-policy || true
          terraform import aws_lambda_function.parser resume-parser-dev || true
          terraform import aws_cloudwatch_log_group.lambda_logs /aws/lambda/resume-parser-dev || true
          terraform import aws_cloudwatch_log_group.api_logs /aws/apigateway/resume-parser-dev || true
          terraform import aws_s3_bucket.resumes ${{ steps.get_ids.outputs.bucket }} || true
          terraform import aws_apigatewayv2_api.api ${{ steps.get_ids.outputs.api_id }} || true

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
